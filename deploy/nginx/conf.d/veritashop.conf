upstream frontend_upstream {
  server frontend:3000;
}

upstream backend_upstream {
  server backend:5001;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  listen [::]:80;
  server_name demo-shop.honeysocial.click demo-api.honeysocial.click;
  client_max_body_size 25m;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name demo-shop.honeysocial.click;
  client_max_body_size 25m;

  ssl_certificate /etc/letsencrypt/live/demo-shop.honeysocial.click/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/demo-shop.honeysocial.click/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 30s;
    proxy_read_timeout 120s;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name demo-api.honeysocial.click;
  client_max_body_size 25m;

  ssl_certificate /etc/letsencrypt/live/demo-api.honeysocial.click/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/demo-api.honeysocial.click/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 30s;
    proxy_read_timeout 120s;
  }
}
