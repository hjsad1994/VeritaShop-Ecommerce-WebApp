services:
  postgres:
    image: postgres:16-alpine
    container_name: veritashop-postgres
    restart: unless-stopped
    profiles: ['local-db']
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nextecommerce}
    ports:
      - '${POSTGRES_PORT:-5436}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-nextecommerce}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veritashop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      BACKEND_DATABASE_URL: ${BACKEND_DATABASE_URL:-}
      CORS_ORIGIN: ${BACKEND_CORS_ORIGIN:-http://localhost:3000}
      FRONTEND_URL: ${BACKEND_FRONTEND_URL:-http://localhost:3000}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      MIGRATION_MAX_ATTEMPTS: ${MIGRATION_MAX_ATTEMPTS:-15}
      MIGRATION_RETRY_DELAY: ${MIGRATION_RETRY_DELAY:-4}
    ports:
      - '${BACKEND_PORT:-5001}:5000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001/api}
        NEXT_PUBLIC_IMAGE_HOSTS: ${NEXT_PUBLIC_IMAGE_HOSTS:-dqwxtopaa87nn.cloudfront.net,d1ffmiafbbgufv.cloudfront.net,verita-phone-store-assets.s3.amazonaws.com,verita-phone-store-assets.s3.us-east-1.amazonaws.com}
    container_name: veritashop-frontend
    restart: unless-stopped
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001/api}
      NEXT_PUBLIC_IMAGE_HOSTS: ${NEXT_PUBLIC_IMAGE_HOSTS:-dqwxtopaa87nn.cloudfront.net,d1ffmiafbbgufv.cloudfront.net,verita-phone-store-assets.s3.amazonaws.com,verita-phone-store-assets.s3.us-east-1.amazonaws.com}
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-3000}:3000'

volumes:
  postgres-data:
